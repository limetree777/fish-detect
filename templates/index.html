<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 물고기 AI 탐지기 </title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* 서버에서 받은 이미지 (상자 그려진 상태) 표시 */
        #processed-image { width: 100%; height: 100%; object-fit: contain; }
        
        /* ⭐ ms 시간 표시 스타일 ⭐ */
        #performance-overlay { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; color: #ffeb3b; border: 1px solid #ffeb3b; }
        
        /* 하단 결과 창 */
        #overlay-bottom { position: absolute; bottom: 30px; left: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border: 1px solid #444; }
        .result-item { font-size: 1.2rem; color: #00e676; margin: 5px 0; }
        .status { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        
        /* 전송용 카메라는 숨김 */
        #video-hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <img id="processed-image" src="" alt="카메라 연결 대기 중...">
        
        <div id="performance-overlay">서버: 대기 중</div>
        
        <video id="video-hidden" autoplay playsinline></video>
        <canvas id="canvas-hidden" width="640" height="640" style="display:none;"></canvas>

        <div id="overlay-bottom">
            <div class="status" id="status">상태: 카메라 연결 대기 중...</div>
            <div id="results">물체를 화면에 비춰주세요.</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-hidden');
        const canvas = document.getElementById('canvas-hidden');
        const processedImage = document.getElementById('processed-image');
        const perfOverlay = document.getElementById('performance-overlay');
        const resultsDiv = document.getElementById('results');
        const statusDiv = document.getElementById('status');

        // 1. 카메라 시작
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { statusDiv.innerText = "카메라 에러: " + err; });

        // 2. 실시간 루프 (0.5초마다 실행)
        async function detectLoop() {
            // 카메라 화면을 캔버스에 그리기
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 640);
            
            // 이미지 압축 및 전송
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'frame.jpg');

                // ⭐ 시간 측정 시작 ⭐
                const startTime = performance.now();
                
                try {
                    const response = await fetch('/predict', { method: 'POST', body: formData });
                    const data = await response.json();
                    
                    // ⭐ 시간 측정 종료 및 ms 계산 ⭐
                    const endTime = performance.now();
                    const processingTime = Math.round(endTime - startTime);

                    if (data.image_data) {
                        // 서버에서 그려준 이미지를 화면에 표시
                        processedImage.src = data.image_data;
                        statusDiv.innerText = `상태: 실시간 분석 중`;
                        
                        // ⭐ ms 시간 업데이트 ⭐
                        perfOverlay.innerText = `서버: ${processingTime}ms`;
                        
                        // 지연 시간에 따라 표시 색상 변경 (예시)
                        if (processingTime > 800) perfOverlay.style.color = '#ff5252'; // 빨간색
                        else if (processingTime > 400) perfOverlay.style.color = '#ffeb3b'; // 노란색
                        else perfOverlay.style.color = '#00e676'; // 초록색
                    }

                    if (data.predictions && data.predictions.length > 0) {
                        // ⭐ 결과 표시 ⭐
                        resultsDiv.innerHTML = data.predictions.map(p => `
                            <div class="result-item">
                                <b>${p.species}</b> (확률: ${Math.round(p.confidence * 100)}%)
                            </div>
                        `).join('');
                    } else {
                        resultsDiv.innerHTML = "감지된 대상 없음";
                    }
                } catch (e) {
                    console.error("서버 에러:", e);
                    statusDiv.innerText = "서버 연결 오류";
                    perfOverlay.innerText = "서버: 오류";
                    perfOverlay.style.color = '#ff5252';
                }
                
                // 루프 속도 조절 (0.5초 뒤 다시 실행)
                setTimeout(detectLoop, 500);
            }, 'image/jpeg', 0.6); // 이미지 화질 60%로 압축하여 전송 속도 향상
        }

        // 비디오 재생이 시작되면 루프 시작
        video.onplay = () => { detectLoop(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생선선생 (AI 어종 분석)</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 10px; background-color: #f0f0f5; }
    #videoContainer { position: relative; margin: 0 auto; max-width: 100%; }
    video, canvas { border: 2px solid #333; border-radius: 8px; max-width: 100%; touch-action: none; }
    
    button { padding: 12px 24px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; background-color: #007bff; color: white;}
    button:disabled { background-color: #cccccc; cursor: not-allowed; }
    
    #instruction { font-size: 18px; color: #333; margin-bottom: 10px; font-weight: bold; }
    #resultBox { display: none; margin-top: 20px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <h2>생선선생 (AI 어종 분석)</h2>
  <div id="instruction">카메라로 물고기를 비추고 촬영하세요.</div>
  
  <div id="videoContainer">
    <video id="webcam" autoplay playsinline style="display: inline-block;"></video>
    <canvas id="imageCanvas" style="display:none;"></canvas>
  </div>

  <div>
    <button id="captureBtn">📸 촬영 및 AI 분석 시작</button>
    <button id="retakeBtn" style="display:none;">🔄 다시 찍기</button>
  </div>

  <div id="resultBox">
    <div id="speciesText" style="font-size: 18px; margin-bottom: 10px;"></div>
    <div id="lengthText" style="font-size: 22px; font-weight: bold; color: #d9534f;"></div>
  </div>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    
    const instruction = document.getElementById('instruction');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    
    const resultBox = document.getElementById('resultBox');
    const speciesText = document.getElementById('speciesText');
    const lengthText = document.getElementById('lengthText');

    let stream = null;
    let points = [];
    let isAnalyzing = false; // 측정 단계인지 확인하는 플래그
    const CARD_LENGTH_CM = 8.56;

    // 카메라 켜기
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
      } catch (err) {
        instruction.innerHTML = "카메라 권한을 허용해주세요.";
      }
    }
    startCamera();

    // 1. 촬영 버튼 클릭 -> 캡처 후 즉시 서버 전송
    captureBtn.addEventListener('click', () => {
      // 숨겨진 임시 캔버스로 캡처
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = video.videoWidth;
      tempCanvas.height = video.videoHeight;
      tempCanvas.getContext('2d').drawImage(video, 0, 0);
      
      video.style.display = 'none';
      captureBtn.style.display = 'none';
      instruction.innerHTML = "⏳ AI가 물고기를 분석 중입니다...";

      // Blob으로 변환하여 서버로 전송
      tempCanvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append("image", blob, "capture.jpg"); 

        try {
          // 플라스크의 /detect 엔드포인트 호출
          const response = await fetch('/detect', { method: 'POST', body: formData });
          const result = await response.json();
          
          if(result.status === 'success') {
            displayAIResult(result);
          } else {
            alert("분석 실패: " + result.error);
            resetUI();
          }
        } catch (error) {
          alert("서버 통신 오류가 발생했습니다.");
          resetUI();
        }
      }, 'image/jpeg');
    });

    // 2. 서버에서 받은 AI 결과 띄우기
    function displayAIResult(result) {
      // 캔버스에 YOLO 분석이 끝난 이미지 그리기
      const resultImg = new Image();
      resultImg.onload = () => {
        canvas.width = resultImg.width;
        canvas.height = resultImg.height;
        ctx.drawImage(resultImg, 0, 0);
        
        canvas.style.display = 'inline-block';
        retakeBtn.style.display = 'inline-block';
        
        // 종 목록 표시
        let speciesHtml = '🐟 <b>감지된 객체:</b><ul style="text-align: left; margin: 5px 0;">';
        if (result.detected_objects.length > 0) {
          result.detected_objects.forEach(obj => {
            speciesHtml += `<li>${obj.species} (${obj.confidence}%)</li>`;
          });
        } else {
          speciesHtml += '<li>감지된 객체가 없습니다.</li>';
        }
        speciesHtml += '</ul>';
        speciesText.innerHTML = speciesHtml;
        resultBox.style.display = 'block';

        // 수동 측정 모드 활성화
        points = [];
        isAnalyzing = true;
        instruction.innerHTML = "<b>[1단계]</b> 기준 카드의 긴 면 양 끝점 2개를 터치하세요.";
      };
      resultImg.src = result.result_image;
    }

    // 3. 자바스크립트 수동 터치 및 즉각 계산
    canvas.addEventListener('click', (e) => {
      if (!isAnalyzing || points.length >= 4) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      
      points.push({ x: x, y: y });

      // 점 그리기
      ctx.fillStyle = points.length <= 2 ? 'red' : 'blue';
      ctx.beginPath();
      ctx.arc(x, y, canvas.width * 0.01, 0, Math.PI * 2);
      ctx.fill();

      if (points.length === 2) {
        // 첫 두 점(카드) 선 긋기
        drawLine(points[0], points[1], 'red');
        instruction.innerHTML = "<b>[2단계]</b> 물고기의 머리와 꼬리를 터치하세요.";
      } else if (points.length === 4) {
        // 나중 두 점(물고기) 선 긋기
        drawLine(points[2], points[3], 'blue');
        
        // 자바스크립트로 길이 계산 (유클리드 거리)
        const cardPixelDist = Math.hypot(points[1].x - points[0].x, points[1].y - points[0].y);
        const fishPixelDist = Math.hypot(points[3].x - points[2].x, points[3].y - points[2].y);
        
        const cmPerPixel = CARD_LENGTH_CM / cardPixelDist;
        const fishActualLength = fishPixelDist * cmPerPixel;

        lengthText.innerHTML = `📏 측정 길이: 약 ${fishActualLength.toFixed(1)} cm`;
        instruction.innerHTML = "<b>측정 완료!</b>";
      }
    });

    // 캔버스에 선 그리는 함수
    function drawLine(p1, p2, color) {
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    // 다시 찍기 버튼
    retakeBtn.addEventListener('click', resetUI);

    function resetUI() {
      canvas.style.display = 'none';
      video.style.display = 'inline-block';
      captureBtn.style.display = 'inline-block';
      retakeBtn.style.display = 'none';
      resultBox.style.display = 'none';
      lengthText.innerHTML = "";
      isAnalyzing = false;
      instruction.innerHTML = "카메라로 물고기를 비추고 촬영하세요.";
    }
  </script>
</body>
</html>
